# Deploys the static site in `public/` to GitHub Pages on every push to `main`.
#
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions.
# After the first successful run, the site URL appears in the job summary and Environments.
#
# Note: The app stores the OpenAI API key in the browser (localStorage). Anyone who can
# open the deployed page could extract the key from DevTools—use restricted keys and avoid
# sharing the URL with untrusted users unless you add a backend proxy.

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
